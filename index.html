        function performSync() {
	    if (!audioUnlocked) {
   	        const unlock = new SpeechSynthesisUtterance(" ");
   	        window.speechSynthesis.speak(unlock);
                window.speechSynthesis.cancel();
  	        audioUnlocked = true;
	    }
	    const music = document.getElementById('bg-music');
	    if (music) {
    		music.volume = 0.3;
    		music.play().catch(()=>{});
	    }
            const syncScreen = document.getElementById('sync-screen');
            const bar = document.getElementById('sync-progress');
            const label = document.getElementById('sync-label');
	    document.querySelector('.nav-bar').style.display = 'none';
            syncScreen.style.display = 'flex';
            label.innerText = langData[currentLang].sync;

            let progress = 0;
            const iv = setInterval(() => {
                progress += 5;
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        syncScreen.style.display = 'none';
			document.querySelector('.nav-bar').style.display = 'flex';
			changeTab('trans');
                        startLiveFeed();
                    }, 400);
                }
            }, 100);
        }

        function startLiveFeed() {
			const BASE_VOLUME = 0.3;   // normal music
			const LOW_VOLUME = 0.08;   // during speech
			const BOOST_VOLUME = 0.4;  // after speech (slightly louder)
    document.getElementById('trans-init').style.display = 'none';
    document.getElementById('live-content').style.display = 'block';

    const feed = document.getElementById('script-feed');
    feed.innerHTML = '';

    const script = langData[currentLang]?.script || langData.en.script;

    script.forEach((item, index) => {
        const el = document.createElement('div');
        el.id = 'line-' + index;
        el.className = item.s ? 'stage-note' : 'line';
        el.innerText = item.s || item.m;
        feed.appendChild(el);
    });

    const music = document.getElementById('bg-music');

    let fadeInterval;

function fadeTo(target, duration = 300) {
    if (!music) return;

    clearInterval(fadeInterval);

    const start = music.volume;
    const change = target - start;
    const steps = duration / 50;
    let currentStep = 0;

    fadeInterval = setInterval(() => {
        currentStep++;
        music.volume = start + (change * (currentStep / steps));

        if (currentStep >= steps) {
            music.volume = target;
            clearInterval(fadeInterval);
        }
    }, 50);
}

    let startTime = Date.now();
    let spoken = new Set();

    setInterval(() => {
        let elapsed = (Date.now() - startTime) / 1000;

        script.forEach((item, index) => {
            if (elapsed >= item.t) {
                const lineEl = document.getElementById('line-' + index);

                if (lineEl && !lineEl.classList.contains('active')) {
                    document.querySelectorAll('.line, .stage-note').forEach(l => l.classList.remove('active'));
                    const lineEl = document.getElementById('line-' + index);
					lineEl.classList.add('active');
					lineEl.scrollIntoView({
    					behavior: 'smooth',
    					block: 'center'
					});

                    if (item.m && !spoken.has(index)) {
                        spoken.add(index);

                        window.speechSynthesis.cancel();

                        let speech = new SpeechSynthesisUtterance(item.m);

                        if (currentLang === 'zh') speech.lang = 'zh-CN';
                        else if (currentLang === 'vn') speech.lang = 'vi-VN';
                        else if (currentLang === 'ja') speech.lang = 'ja-JP';
                        else if (currentLang === 'ko') speech.lang = 'ko-KR';
                        else speech.lang = currentLang;

                        fadeTo(LOW_VOLUME); // lower during speech

						speech.onend = () => {
    						fadeTo(BOOST_VOLUME, 400); // slight boost after

    						// return to normal after short time
    						setTimeout(() => {
        						fadeTo(BASE_VOLUME, 600);
    						}, 1200);
						};
			};

                        window.speechSynthesis.speak(speech);
                    }
                }
            }
        });

    }, 500);
}


function expandImg(img) {
    const modal = document.getElementById('img-modal');
    const modalImg = document.getElementById('modal-img');

    modalImg.src = img.src;
    modal.style.display = 'flex';
}

document.getElementById('img-modal').onclick = function () {
    this.style.display = 'none';
};
